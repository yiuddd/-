let idx = Number(localStorage.getItem("tj_watch_idx") || 0);
if (idx < 0 || idx >= qs.length) idx = 0;

function render() {
  const q = qs[idx];
  document.getElementById("meta").textContent = "第 " + q.num + " 题 / 共 " + qs.length + " 题";
  document.getElementById("jump").value = q.num;
  const sh = document.getElementById("shared");
  sh.textContent = q.shared || "";
  sh.style.display = q.shared ? "block" : "none";
  document.getElementById("stem").textContent = q.num + ". " + q.stem;
  const opts = document.getElementById("opts");
  opts.innerHTML = "";
  (q.options || []).forEach(o => {
    const div = document.createElement("div");
    div.className = "opt";
    div.innerHTML = '<span class="label">' + o.label + '.</span>' + escapeHtml(o.text);
    opts.appendChild(div);
  });
  const ans = document.getElementById("answer");
  ans.textContent = "答案：" + (q.answer || "未识别");
  ans.style.display = "none";
  localStorage.setItem("tj_watch_idx", idx);
  window.scrollTo(0,0);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function toggleAns() {
  const a = document.getElementById("answer");
  a.style.display = a.style.display === "block" ? "none" : "block";
}
function prevQ() { if (idx > 0) { idx--; render(); } }
function nextQ() { if (idx < qs.length-1) { idx++; render(); } }
function jumpQ() {
  const n = Number(document.getElementById("jump").value);
  const pos = qs.findIndex(q => q.num === n);
  if (pos >= 0) { idx = pos; render(); }
}
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") prevQ();
  if (e.key === "ArrowRight") nextQ();
  if (e.key === " ") toggleAns();
});
